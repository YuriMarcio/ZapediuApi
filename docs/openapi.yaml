openapi: '3.0.3'
info:
  title: DeliveryZap API
  description: API completa do DeliveryZap
  version: '1.0.0'

servers:
  - url: http://localhost:8080
    description: Local Docker

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: owner@minhaloja.com.br
                password:
                  type: string
                  example: senha123
                company_token:
                  type: string
                  example: tok_abc
                device_name:
                  type: string
                  example: web-app
      responses:
        '200':
          description: Token gerado
          content:
            application/json:
              example:
                token: 1|abc123xyz
                token_type: Bearer
                user:
                  id: 1
                  name: Joao
                  role: owner

  /tenant/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200':
          description: Sessao encerrada

  /public/onboarding/metadata:
    get:
      tags: [Onboarding Publico]
      summary: Get Metadata
      security: []
      responses:
        '200':
          description: Metadata

  /public/seller-codes/validate:
    post:
      tags: [Onboarding Publico]
      summary: Validate Seller Code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                seller_code:
                  type: string
                  example: VENDEDOR-ABC123
      responses:
        '200':
          description: Valido

  /public/onboarding/stores:
    post:
      tags: [Onboarding Publico]
      summary: Create Store (Onboarding)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                seller_code:
                  type: string
                  example: VENDEDOR-ABC123
      responses:
        '201':
          description: Loja criada

  /admin/sellers:
    post:
      tags: [Admin]
      summary: Create Seller
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Maria
                email:
                  type: string
                  example: maria@example.com
      responses:
        '201':
          description: Vendedor criado

  /admin/endpoints:
    get:
      tags: [Admin]
      summary: List Endpoints
      security:
        - AdminToken: []
      responses:
        '200':
          description: Rotas

  /admin/endpoints/test-webhook:
    post:
      tags: [Admin]
      summary: Test Webhook
      security:
        - AdminToken: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
      responses:
        '200':
          description: OK

  /tenant/company:
    get:
      tags: [Empresa]
      summary: Get Company
      responses:
        '200':
          description: Empresa
    put:
      tags: [Empresa]
      summary: Update Company
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Atualizado

  /tenant/products:
    get:
      tags: [Produtos]
      summary: List Products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: integer
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Produtos
    post:
      tags: [Produtos]
      summary: Create Product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: X-Burguer
                price:
                  type: number
                  example: 29.90
                category_id:
                  type: integer
                  example: 1
                description:
                  type: string
                  example: Hamburguer com queijo e alface
                is_active:
                  type: boolean
                  example: true
      responses:
        '201':
          description: Criado

  /tenant/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    get:
      tags: [Produtos]
      summary: Show Product
      responses:
        '200':
          description: Produto
    put:
      tags: [Produtos]
      summary: Update Product
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                is_active:
                  type: boolean
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Produtos]
      summary: Delete Product
      responses:
        '200':
          description: Removido

  /tenant/stores:
    get:
      tags: [Lojas]
      summary: List Stores
      responses:
        '200':
          description: Lojas
    post:
      tags: [Lojas]
      summary: Create Store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Minha Loja
                phone:
                  type: string
                  example: '11999999999'
      responses:
        '201':
          description: Criado

  /tenant/stores/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    get:
      tags: [Lojas]
      summary: Show Store
      responses:
        '200':
          description: Loja

  /tenant/stores/{id}/identity:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Lojas]
      summary: Update Store Identity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                logo:
                  type: string
      responses:
        '200':
          description: Atualizado

  /tenant/stores/{id}/address:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Lojas]
      summary: Update Store Address
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                state:
                  type: string
      responses:
        '200':
          description: Atualizado

  /tenant/stores/{id}/hours:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Lojas]
      summary: Update Store Hours
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hours:
                  type: array
                  items:
                    type: object
                    properties:
                      day:
                        type: integer
                        example: 1
                      opens_at:
                        type: string
                        example: '08:00'
                      closes_at:
                        type: string
                        example: '18:00'
      responses:
        '200':
          description: Atualizado

  /tenant/categories:
    get:
      tags: [Categorias]
      summary: List Categories
      responses:
        '200':
          description: Categorias
    post:
      tags: [Categorias]
      summary: Create Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Lanches
      responses:
        '201':
          description: Criado

  /tenant/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Categorias]
      summary: Update Category
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Categorias]
      summary: Delete Category
      responses:
        '200':
          description: Removido

  /tenant/selection-groups:
    get:
      tags: [Grupos de Selecao]
      summary: List Selection Groups
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Grupos
    post:
      tags: [Grupos de Selecao]
      summary: Create Selection Group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Adicionais
                display_type:
                  type: string
                  enum: [custom, size, weight, type, presentation]
                  example: custom
                min:
                  type: integer
                  example: 0
                max:
                  type: integer
                  example: 5
      responses:
        '201':
          description: Criado

  /tenant/selection-groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    get:
      tags: [Grupos de Selecao]
      summary: Show Selection Group
      responses:
        '200':
          description: Grupo
    put:
      tags: [Grupos de Selecao]
      summary: Update Selection Group
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Grupos de Selecao]
      summary: Delete Selection Group
      responses:
        '200':
          description: Removido

  /tenant/variations:
    get:
      tags: [Variacoes]
      summary: List Variation Groups
      responses:
        '200':
          description: Variacoes
    post:
      tags: [Variacoes]
      summary: Create Variation Group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Tamanho
                options:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: P
                      price_modifier:
                        type: number
                        example: 0
      responses:
        '201':
          description: Criado

  /tenant/variations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Variacoes]
      summary: Update Variation Group
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Variacoes]
      summary: Delete Variation Group
      responses:
        '204':
          description: Removido

  /tenant/flows/catalog:
    get:
      tags: [Fluxos Opcionais]
      summary: Catalog
      responses:
        '200':
          description: Catalogo de tipos disponiveis

  /tenant/flows:
    get:
      tags: [Fluxos Opcionais]
      summary: List Flows
      responses:
        '200':
          description: Fluxos
    post:
      tags: [Fluxos Opcionais]
      summary: Create Flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Personalizar Pizza
                type:
                  type: string
                  example: pizza
      responses:
        '201':
          description: Criado

  /tenant/flows/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    get:
      tags: [Fluxos Opcionais]
      summary: Show Flow
      responses:
        '200':
          description: Fluxo
    put:
      tags: [Fluxos Opcionais]
      summary: Update Flow
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Fluxos Opcionais]
      summary: Delete Flow
      responses:
        '200':
          description: Removido

  /tenant/flows/{id}/configure:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    put:
      tags: [Fluxos Opcionais]
      summary: Configure Steps
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      selection_group_id:
                        type: integer
      responses:
        '200':
          description: Configurado

  /tenant/analytics/overview:
    get:
      tags: [Analytics]
      summary: Overview
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            example: today
      responses:
        '200':
          description: Overview

  /tenant/analytics/revenue:
    get:
      tags: [Analytics]
      summary: Revenue
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Revenue

  /tenant/analytics/hourly:
    get:
      tags: [Analytics]
      summary: Hourly
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Hourly

  /tenant/analytics/categories:
    get:
      tags: [Analytics]
      summary: Categories Ranking
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Categories

  /tenant/analytics/whatsapp:
    get:
      tags: [Analytics]
      summary: WhatsApp Stats
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
      responses:
        '200':
          description: WhatsApp

  /tenant/orders/summary:
    get:
      tags: [Pedidos]
      summary: Orders Summary
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Summary

  /tenant/orders:
    get:
      tags: [Pedidos]
      summary: List Orders
      parameters:
        - name: store_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Pedidos

  /tenant/orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    get:
      tags: [Pedidos]
      summary: Show Order
      responses:
        '200':
          description: Pedido

  /tenant/orders/{id}/accept:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    post:
      tags: [Pedidos]
      summary: Accept Order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                estimated_minutes:
                  type: integer
                  example: 30
      responses:
        '200':
          description: Aceito

  /tenant/orders/{id}/reject:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    post:
      tags: [Pedidos]
      summary: Reject Order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Loja fechada no momento.
      responses:
        '200':
          description: Rejeitado

  /tenant/orders/{id}/advance:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    post:
      tags: [Pedidos]
      summary: Advance Order Status
      responses:
        '200':
          description: Avancado

  /tenant/orders/{id}/notify-status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
    post:
      tags: [WhatsApp]
      summary: Notify Order Status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Pedido pronto para retirada!
      responses:
        '200':
          description: Notificado

tags:
  - name: Auth
    description: Autenticacao via Sanctum
  - name: Onboarding Publico
    description: Endpoints publicos sem autenticacao
  - name: Admin
    description: Endpoints admin com X-Admin-Token
  - name: Empresa
    description: Gerenciamento da empresa
  - name: Produtos
    description: CRUD de produtos
  - name: Lojas
    description: Gerenciamento de lojas
  - name: Categorias
    description: CRUD de categorias
  - name: Grupos de Selecao
    description: Grupos de adicionais/opcionais
  - name: Variacoes
    description: Grupos de variacao de produto
  - name: Fluxos Opcionais
    description: Fluxos de personalizacao de pedido
  - name: Analytics
    description: Metricas do dashboard
  - name: Pedidos
    description: Gerenciamento de pedidos
  - name: WhatsApp
    description: Notificacoes via WhatsApp
