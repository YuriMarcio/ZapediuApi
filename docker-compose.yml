services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: deliveryzapapi-app
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - delivery-net

  nginx:
    image: nginx:1.27-alpine
    container_name: deliveryzapapi-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - delivery-net

  db:
    image: mysql:8.4
    container_name: deliveryzapapi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-deliveryzap}
      MYSQL_USER: ${DB_USERNAME:-deliveryzap}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 12
      interval: 10s
    networks:
      - delivery-net

  # 👉 SERVIÇO REDIS ADICIONADO
  redis:
    image: redis:alpine
    container_name: deliveryzapapi-redis
    restart: unless-stopped
    networks:
      - delivery-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:5
    container_name: deliveryzapapi-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - delivery-net

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: deliveryzapapi-worker
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - delivery-net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: deliveryzapapi-ngrok
    restart: unless-stopped
    command: http --log stdout --pooling-enabled host.docker.internal:8080
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4041:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nginx
    networks:
      - delivery-net

volumes:
  db_data:

networks:
  delivery-net:
    driver: bridge